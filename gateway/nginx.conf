events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    upstream frontend {
        server client:3000;
    }

    upstream backend_rest {
        server server-1:5001;
    }

    upstream backend_graphql {
        server server-2:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Socket.io — must be BEFORE the catch-all "/" block ──────────────
        # nginx matches location blocks by longest prefix first, so /socket.io/
        # wins over / for socket traffic. We also need correct WebSocket headers
        # and must NOT buffer — socket.io long-polling breaks with buffering.
        location /socket.io/ {
            proxy_pass http://backend_rest;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering — required for long-polling fallback
            proxy_buffering off;
            proxy_cache off;

            # Keep connections alive for the full session
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://backend_rest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── GraphQL ──────────────────────────────────────────────────────────
        location /graphql {
            proxy_pass http://backend_graphql;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Next.js frontend (catch-all — must be LAST) ──────────────────────
        # Only send the Connection: upgrade header when the client actually
        # requested an upgrade (Next.js HMR). For normal HTTP requests we
        # clear it so the upstream sees a plain keep-alive connection.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # Conditionally upgrade — avoids polluting normal HTTP with WS headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
