events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── WebSocket connection upgrade map ────────────────────────────────────
    # Maps the incoming Connection header to either "upgrade" (WebSocket) or
    # "" (plain HTTP keep-alive). This allows the socket.io polling fallback
    # to work correctly alongside the WebSocket transport.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    upstream frontend {
        server client:3000;
    }

    upstream backend_rest {
        server server-1:5001;
    }

    upstream backend_graphql {
        server server-2:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Socket.io — must be BEFORE the catch-all "/" block ──────────────
        # Uses the connection_upgrade map so that:
        #   - WebSocket requests  -> Connection: upgrade  (WS handshake)
        #   - Polling requests    -> Connection: ""       (plain HTTP)
        # Without the map, forcing "upgrade" on polling breaks long-polling.
        location /socket.io/ {
            proxy_pass http://backend_rest;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering -- required for long-polling fallback
            proxy_buffering off;
            proxy_cache off;

            # Keep connections alive for the full session
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://backend_rest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── GraphQL ──────────────────────────────────────────────────────────
        # Regex location matches both /graphql and /graphql/ so that
        # Strawberry's trailing-slash 307 redirect stays within this block
        # and never falls through to the Next.js catch-all.
        location ~* ^/graphql(/.*)?$ {
            proxy_pass http://backend_graphql;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Next.js frontend (catch-all -- must be LAST) ─────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
